<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mueblería AMI — Catálogo</title>
<style>
  :root {
    --verde: #b5c49a;
    --marino: #1e2d3d;
    --rojo: #e63232;
    --crema: #f7f4ef;
    --gris: #6b7280;
    --borde: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--crema); color: var(--marino); }

  /* HEADER */
  header {
    background: var(--marino);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-text { color: white; }
  .logo-text span { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; opacity: .6; display: block; }
  .logo-text strong { font-size: 26px; font-weight: 900; color: white; letter-spacing: -1px; }
  .logo img { height: 46px; background: white; border-radius: 8px; padding: 4px 10px; display: block; }
  .wa-header-btn {
    background: #25D366;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--marino) 0%, #2d4a6b 100%);
    color: white;
    text-align: center;
    padding: 56px 24px 48px;
  }
  .hero h1 { font-size: clamp(28px, 5vw, 48px); font-weight: 900; margin-bottom: 12px; }
  .hero h1 span { color: var(--rojo); }
  .hero p { opacity: .75; font-size: 16px; max-width: 500px; margin: 0 auto 28px; }
  .precio-toggle {
    display: inline-flex;
    background: rgba(255,255,255,.1);
    border-radius: 50px;
    padding: 4px;
    gap: 4px;
  }
  .precio-toggle button {
    background: transparent;
    border: none;
    color: rgba(255,255,255,.7);
    padding: 8px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all .2s;
  }
  .precio-toggle button.active {
    background: var(--rojo);
    color: white;
  }

  /* FILTROS */
  .filtros {
    background: white;
    border-bottom: 1px solid var(--borde);
    padding: 0 24px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filtros::-webkit-scrollbar { display: none; }
  .filtro-btn {
    white-space: nowrap;
    background: none;
    border: none;
    padding: 14px 16px;
    font-size: 14px;
    cursor: pointer;
    color: var(--gris);
    border-bottom: 2px solid transparent;
    transition: all .2s;
    font-weight: 500;
  }
  .filtro-btn.active, .filtro-btn:hover {
    color: var(--rojo);
    border-bottom-color: var(--rojo);
  }

  /* GRID */
  .catalogo {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 16px;
  }
  .categoria-titulo {
    font-size: 22px;
    font-weight: 800;
    color: var(--marino);
    margin: 40px 0 20px;
    padding-bottom: 10px;
    border-bottom: 3px solid var(--rojo);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .categoria-titulo:first-child { margin-top: 0; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    transition: transform .2s, box-shadow .2s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
  }
  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: #f0ede8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    color: var(--rojo);
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-nombre { font-size: 15px; font-weight: 700; color: var(--marino); line-height: 1.3; }
  .card-desc { font-size: 13px; color: var(--gris); line-height: 1.5; flex: 1; }
  .card-precios { margin-top: 8px; }
  .precio-contado {
    font-size: 22px;
    font-weight: 900;
    color: var(--marino);
  }
  .precio-cuotas {
    font-size: 13px;
    color: var(--gris);
    margin-top: 2px;
  }
  .precio-cuotas span { font-weight: 700; color: var(--rojo); }
  .precio-destacado {
    font-size: 22px;
    font-weight: 900;
    color: var(--rojo);
  }
  .precio-ref {
    font-size: 12px;
    color: var(--gris);
    text-decoration: line-through;
  }
  .card-wa {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #25D366;
    color: white;
    text-decoration: none;
    padding: 12px;
    font-size: 14px;
    font-weight: 700;
    border-top: 1px solid #e5e7eb;
    transition: background .2s;
  }
  .card-wa:hover { background: #1ebe5a; }

  /* CARD ACTIONS */
  .card-actions { display: flex; border-top: 1px solid var(--borde); }
  .card-agregar {
    flex: 1;
    padding: 12px 8px;
    font-size: 13px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    background: var(--crema);
    color: var(--marino);
    transition: background .2s, color .2s;
    border-right: 1px solid var(--borde);
  }
  .card-agregar:hover { background: #fde8e8; color: var(--rojo); }
  .card-agregar.en-carrito { background: var(--rojo); color: white; }
  .card-wa { flex: 1.4; border-top: none; }

  /* CARRITO FLOTANTE */
  .carrito-float {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 200;
    background: var(--marino);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 22px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
    transition: transform .2s;
  }
  .carrito-float:hover { transform: scale(1.05); }
  .carrito-float.oculto { display: none; }
  .carrito-badge {
    background: var(--rojo);
    color: white;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
  }

  /* PANEL CARRITO */
  .carrito-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 300;
  }
  .carrito-overlay.abierto { display: block; }
  .carrito-panel {
    position: fixed;
    top: 0;
    right: -420px;
    width: 100%;
    max-width: 420px;
    height: 100%;
    background: white;
    z-index: 400;
    display: flex;
    flex-direction: column;
    transition: right .3s ease;
    box-shadow: -4px 0 24px rgba(0,0,0,.2);
  }
  .carrito-panel.abierto { right: 0; }
  .carrito-header {
    background: var(--marino);
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .carrito-header h3 { font-size: 18px; font-weight: 800; }
  .carrito-cerrar {
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }
  .carrito-items { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .carrito-vacio { text-align: center; padding: 60px 20px; color: var(--gris); font-size: 15px; }
  .carrito-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--crema);
    border-radius: 10px;
  }
  .carrito-item-img {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    object-fit: cover;
    background: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .carrito-item-img img { width: 100%; height: 100%; object-fit: cover; }
  .carrito-item-info { flex: 1; }
  .carrito-item-nombre { font-size: 13px; font-weight: 700; color: var(--marino); line-height: 1.3; }
  .carrito-item-precio { font-size: 12px; color: var(--gris); margin-top: 2px; }
  .carrito-item-quitar {
    background: none;
    border: none;
    color: var(--gris);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }
  .carrito-item-quitar:hover { color: var(--rojo); }
  .carrito-footer {
    padding: 20px;
    border-top: 1px solid var(--borde);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .carrito-total { font-size: 14px; color: var(--gris); text-align: center; }
  .carrito-total strong { color: var(--marino); font-size: 16px; }
  .btn-consultar-todo {
    background: #25D366;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background .2s;
  }
  .btn-consultar-todo:hover { background: #1ebe5a; }
  .btn-vaciar {
    background: none;
    border: 1px solid var(--borde);
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    color: var(--gris);
    cursor: pointer;
  }
  .btn-vaciar:hover { color: var(--rojo); border-color: var(--rojo); }

  /* SIN PRECIO */
  .sin-precio { font-size: 14px; color: var(--verde); font-weight: 700; }

  /* FOOTER */
  footer {
    background: var(--marino);
    color: white;
    text-align: center;
    padding: 32px 24px;
    margin-top: 60px;
  }
  footer .logo-footer { font-size: 28px; font-weight: 900; color: var(--verde); }
  footer p { opacity: .6; margin-top: 8px; font-size: 14px; }
  footer .wa-footer {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #25D366;
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    margin-top: 20px;
  }

  /* HOME — GRILLA DE CATEGORÍAS */
  .home-grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .home-cat {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 16/10;
    background: #e5e7eb;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .home-cat img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
  .home-cat:hover img { transform: scale(1.06); }
  .home-cat-emoji { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:64px; }
  .home-cat-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(30,45,61,.82) 0%, rgba(30,45,61,.25) 55%, rgba(30,45,61,.05) 100%);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 18px 20px;
  }
  .home-cat-overlay span { color: white; font-size: 21px; font-weight: 800; text-shadow: 0 1px 6px rgba(0,0,0,.5); line-height:1.15; }
  .home-cat-overlay small { color: rgba(255,255,255,.9); font-size: 12px; margin-top: 4px; font-weight:600; }
  .home-intro { max-width:1200px; margin:0 auto; padding: 24px 16px 0; }
  .home-intro h2 { font-size: 20px; color: var(--marino); font-weight:800; }
  .home-intro p { color: var(--gris); font-size:14px; margin-top:4px; }
  .volver-btn {
    background:none; border:none; color: var(--rojo); font-weight:700; font-size:14px;
    cursor:pointer; padding:0 0 18px; display:inline-flex; align-items:center; gap:6px;
  }
  .volver-btn:hover { text-decoration: underline; }

  /* BUSCADOR */
  .buscador-wrap { background: white; padding: 12px 16px 0; }
  .buscador {
    max-width: 620px; margin: 0 auto;
    display: flex; align-items: center; gap: 10px;
    background: var(--crema); border: 1px solid var(--borde);
    border-radius: 50px; padding: 10px 16px;
    color: var(--gris);
  }
  .buscador:focus-within { border-color: var(--rojo); }
  .buscador input {
    flex: 1; border: none; background: none; outline: none;
    font-size: 15px; color: var(--marino); font-family: inherit;
  }
  .buscador-clear { background:none; border:none; font-size:20px; color:var(--gris); cursor:pointer; line-height:1; padding:0 4px; }

  /* SELECTOR COLCHÓN / SOMMIER + MEDIDA */
  .seg { display:flex; background:var(--crema); border-radius:10px; padding:4px; gap:4px; margin-top:4px; }
  .seg button {
    flex:1; border:none; background:none; cursor:pointer;
    padding:8px 6px; border-radius:8px; font-size:12.5px; font-weight:700;
    color:var(--gris); transition:all .15s; font-family:inherit;
  }
  .seg button.active { background:var(--rojo); color:white; }
  .medidas { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .medidas button {
    border:1px solid var(--borde); background:white; cursor:pointer;
    padding:6px 10px; border-radius:8px; font-size:12px; font-weight:600;
    color:var(--marino); transition:all .15s; font-family:inherit; line-height:1.1;
  }
  .medidas button small { display:block; font-size:9.5px; color:var(--gris); font-weight:500; }
  .medidas button.active { border-color:var(--rojo); background:#fde8e8; color:var(--rojo); }
  .medidas button.active small { color:var(--rojo); }

  /* GALERÍA MULTIFOTO */
  .card-img.galeria { position:relative; }
  .card-img.galeria img { position:absolute; inset:0; opacity:0; transition:opacity .25s; }
  .card-img.galeria img.activa { opacity:1; position:relative; }
  .gal-nav {
    position:absolute; top:50%; transform:translateY(-50%);
    width:30px; height:30px; border-radius:50%; border:none; cursor:pointer;
    background:rgba(255,255,255,.85); color:var(--marino); font-size:18px; line-height:1;
    display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.2); z-index:2;
  }
  .gal-nav.prev { left:8px; } .gal-nav.next { right:8px; }
  .gal-dots { position:absolute; bottom:8px; left:0; right:0; display:flex; justify-content:center; gap:5px; z-index:2; }
  .gal-dots span { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.6); }
  .gal-dots span.on { background:white; }

  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    .logo img { height: 38px; }
    .wa-header-btn { padding: 8px 14px; font-size: 13px; }
    .hero { padding: 32px 18px 28px; }
    .hero p { font-size: 14px; margin-bottom: 20px; }
    .filtros { padding: 0 12px; }
    .filtro-btn { padding: 12px 12px; font-size: 13px; }
    .catalogo { padding: 20px 12px; }
    .categoria-titulo { font-size: 18px; margin: 28px 0 16px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .card-body { padding: 11px; gap: 6px; }
    .card-nombre { font-size: 13px; }
    .card-desc { font-size: 11.5px; line-height: 1.4; }
    .precio-contado, .precio-destacado { font-size: 17px; }
    .precio-cuotas { font-size: 11px; }
    .card-agregar, .card-wa { padding: 10px 6px; font-size: 12px; }
    .home-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 16px 12px; }
    .home-cat { aspect-ratio: 1/1; border-radius: 12px; }
    .home-cat-overlay { padding: 12px; }
    .home-cat-overlay span { font-size: 14px; }
    .home-cat-overlay small { font-size: 10.5px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="filtrar('inicio')" style="cursor:pointer">
    <img src="imgs/logo.png" alt="Mueblería AMI">
  </div>
  <a class="wa-header-btn" href="https://wa.me/5493516637193?text=Hola!%20Quiero%20consultar%20sobre%20sus%20productos" target="_blank">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Consultar
  </a>
</header>

<div class="hero">
  <h1>Amoblá tu hogar<br><span>con estilo y precio</span></h1>
  <p>Entrega inmediata · Envíos a todo Córdoba · Personalizá tu mueble</p>
  <div class="precio-toggle">
    <button class="active" onclick="setModo('contado')">Contado</button>
    <button onclick="setModo('3c')">3 cuotas</button>
    <button onclick="setModo('6c')">6 cuotas</button>
    <button onclick="setModo('12c')">12 cuotas</button>
  </div>
</div>

<div class="buscador-wrap">
  <div class="buscador">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="buscador" type="search" placeholder="Buscar producto…" oninput="buscar(this.value)" autocomplete="off">
    <button class="buscador-clear" id="buscadorClear" onclick="limpiarBusqueda()" style="display:none">×</button>
  </div>
</div>

<div class="filtros" id="filtros">
  <button class="filtro-btn active" data-key="inicio" onclick="filtrar('inicio')">🏠 Inicio</button>
  <button class="filtro-btn" data-key="combos-mesas" onclick="filtrar('combos-mesas')">Combos Mesas y Sillas</button>
  <button class="filtro-btn" data-key="sillas" onclick="filtrar('sillas')">Sillas</button>
  <button class="filtro-btn" data-key="mesas" onclick="filtrar('mesas')">Mesas</button>
  <button class="filtro-btn" data-key="racks-tv" onclick="filtrar('racks-tv')">Racks / TV</button>
  <button class="filtro-btn" data-key="living" onclick="filtrar('living')">Living, Sofás y Sillones</button>
  <button class="filtro-btn" data-key="placares" onclick="filtrar('placares')">Placares</button>
  <button class="filtro-btn" data-key="comodas" onclick="filtrar('comodas')">Cómodas</button>
  <button class="filtro-btn" data-key="cuchetas" onclick="filtrar('cuchetas')">Cuchetas</button>
  <button class="filtro-btn" data-key="descanso" onclick="filtrar('descanso')">Colchones y Sommiers</button>
  <button class="filtro-btn" data-key="cocina" onclick="filtrar('cocina')">Cocina</button>
  <button class="filtro-btn" data-key="escritorios" onclick="filtrar('escritorios')">Escritorios</button>
  <button class="filtro-btn" data-key="infantil" onclick="filtrar('infantil')">Línea Infantil</button>
</div>

<div class="catalogo" id="catalogo"></div>

<footer>
  <div class="logo-footer">AMI</div>

  return `https://wa.me/${WA}?text=${msg}`;
}

const WA_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

function imgList(id) { const v = imgMap[id]; return !v ? [] : (Array.isArray(v) ? v : [v]); }

function galleryHTML(list, nombre, emoji) {
  if (!list.length) return `<div class="card-img">${emoji || '🛒'}</div>`;
  if (list.length === 1) return `<div class="card-img"><img src="${list[0]}" alt="${nombre}" loading="lazy"></div>`;
  return `<div class="card-img galeria" data-idx="0">` +
    list.map((s,i) => `<img src="${s}" class="${i===0?'activa':''}" alt="${nombre}" loading="lazy">`).join('') +
    `<button class="gal-nav prev" onclick="galNav(this,-1,event)">‹</button>` +
    `<button class="gal-nav next" onclick="galNav(this,1,event)">›</button>` +
    `<div class="gal-dots">` + list.map((_,i)=>`<span class="${i===0?'on':''}"></span>`).join('') + `</div>` +
  `</div>`;
}
function galNav(btn, dir, ev) {
  ev.preventDefault(); ev.stopPropagation();
  const g = btn.closest('.galeria');
  const imgs = g.querySelectorAll('img'), dots = g.querySelectorAll('.gal-dots span');
  let idx = parseInt(g.dataset.idx, 10);
  imgs[idx].classList.remove('activa'); dots[idx].classList.remove('on');
  idx = (idx + dir + imgs.length) % imgs.length;
  imgs[idx].classList.add('activa'); dots[idx].classList.add('on');
  g.dataset.idx = idx;
}

function renderPrecioValor(contado, precioTachado) {
  if (!contado) return `<div class="sin-precio">Consultá precio</div>`;
  const c3 = contado * (1 + RECARGO_3C) / 3;
  const c6 = contado * (1 + RECARGO_6C) / 6;
  const c12 = contado * (1 + RECARGO_12C) / 12;
  if (modoActual === 'contado') {
    let html = (precioTachado ? `<div class="precio-ref">${formatPeso(precioTachado)}</div>` : '') + `<div class="precio-contado">${formatPeso(contado)}</div>`;
    html += `<div class="precio-cuotas">3 cuotas de <span>${formatPeso(c3)}</span> · 6 de <span>${formatPeso(c6)}</span> · 12 de <span>${formatPeso(c12)}</span></div>`;
    return html;
  } else if (modoActual === '3c') {
    return `<div class="precio-destacado">3 × ${formatPeso(c3)}</div><div class="precio-cuotas">Total: ${formatPeso(contado*(1+RECARGO_3C))} · Contado: ${formatPeso(contado)}</div>`;
  } else if (modoActual === '6c') {
    return `<div class="precio-destacado">6 × ${formatPeso(c6)}</div><div class="precio-cuotas">Total: ${formatPeso(contado*(1+RECARGO_6C))} · Contado: ${formatPeso(contado)}</div>`;
  } else {
    return `<div class="precio-destacado">12 × ${formatPeso(c12)}</div><div class="precio-cuotas">Total: ${formatPeso(contado*(1+RECARGO_12C))} · Contado: ${formatPeso(contado)}</div>`;
  }
}
function renderPrecio(p) { return renderPrecioValor(p.precio, p.precioTachado); }

function cardHTML(p) {
  const key = 'p' + p.id, en = enCarrito(key);
  return `
    <div class="card">
      ${galleryHTML(imgList(p.id), p.nombre, p.emoji)}
      <div class="card-body">
        <div class="card-nombre">${p.nombre}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-precios">${renderPrecio(p)}</div>
      </div>
      <div class="card-actions">
        <button class="card-agregar${en?' en-carrito':''}" onclick="toggleCarrito(${p.id})">${en?'✓ Agregado':'+ Agregar'}</button>
        <a class="card-wa" href="${waLink(p)}" target="_blank">${WA_ICON} Consultar</a>
      </div>
    </div>`;
}

// ----- COLCHONES / SOMMIERS con selector -----
const selColchon = {};
function getSelColchon(id) { return selColchon[id] || (selColchon[id] = { tipo:'colchon', idx:0 }); }
function precioColchon(m, sel) { const md = m.medidas[sel.idx]; return sel.tipo==='colchon' ? md.colchon : md.sommier; }
function nombreColchon(m, sel) { const md = m.medidas[sel.idx]; return `${sel.tipo==='colchon'?'Colchón':'Sommier c/base'} ${m.nombre} ${md.m}`; }
function keyColchon(m, sel) { return `c-${m.id}-${sel.tipo}-${sel.idx}`; }
function waColchon(m, sel) {
  const md = m.medidas[sel.idx];
  const tipo = sel.tipo==='colchon' ? 'Colchón' : 'Sommier con base';
  const msg = encodeURIComponent(`Hola! Quiero consultar sobre: *${tipo} ${m.nombre}* medida ${md.m} (${formatPeso(precioColchon(m,sel))})`);
  return `https://wa.me/${WA}?text=${msg}`;
}
function renderColchonCard(m) {
  const sel = getSelColchon(m.id);
  const en = enCarrito(keyColchon(m, sel));
  return `
    <div class="card" data-colchon="${m.id}">
      ${galleryHTML(m.img?[m.img]:[], m.nombre, '🛏️')}
      <div class="card-body">
        <div class="card-nombre">${m.nombre}</div>
        <div class="card-desc">${m.spec}</div>
        <div class="seg">
          <button class="${sel.tipo==='colchon'?'active':''}" onclick="setTipoColchon('${m.id}','colchon')">Colchón solo</button>
          <button class="${sel.tipo==='sommier'?'active':''}" onclick="setTipoColchon('${m.id}','sommier')">Sommier c/ base</button>
        </div>
        <div class="medidas">
          ${m.medidas.map((md,i)=>`<button class="${sel.idx===i?'active':''}" onclick="setMedidaColchon('${m.id}',${i})">${md.m}<small>${md.plaza}</small></button>`).join('')}
        </div>
        <div class="card-precios" data-precio-colchon>${renderPrecioValor(precioColchon(m,sel))}</div>
      </div>
      <div class="card-actions">
        <button class="card-agregar${en?' en-carrito':''}" data-agregar-colchon onclick="agregarColchon('${m.id}')">${en?'✓ Agregado':'+ Agregar'}</button>
        <a class="card-wa" data-wa-colchon href="${waColchon(m,sel)}" target="_blank">${WA_ICON} Consultar</a>
      </div>
    </div>`;
}
function setTipoColchon(id, tipo) { getSelColchon(id).tipo = tipo; refreshColchon(id); }
function setMedidaColchon(id, idx) { getSelColchon(id).idx = idx; refreshColchon(id); }
function refreshColchon(id) {
  const m = colchones.find(c=>c.id===id), sel = getSelColchon(id);
  const card = document.querySelector(`[data-colchon="${id}"]`);
  if (!card) return;
  const seg = card.querySelectorAll('.seg button');
  seg[0].classList.toggle('active', sel.tipo==='colchon');
  seg[1].classList.toggle('active', sel.tipo==='sommier');
  card.querySelectorAll('.medidas button').forEach((b,i)=>b.classList.toggle('active', i===sel.idx));
  card.querySelector('[data-precio-colchon]').innerHTML = renderPrecioValor(precioColchon(m,sel));
  card.querySelector('[data-wa-colchon]').href = waColchon(m, sel);
  const en = enCarrito(keyColchon(m, sel));
  const ag = card.querySelector('[data-agregar-colchon]');
  ag.classList.toggle('en-carrito', en);
  ag.innerHTML = en ? '✓ Agregado' : '+ Agregar';
}
function agregarColchon(id) {
  const m = colchones.find(c=>c.id===id), sel = getSelColchon(id);
  toggleKey(keyColchon(m,sel), nombreColchon(m,sel), precioColchon(m,sel), m.img||null);
}

function renderHome() {
  let html = '<div class="home-intro"><h2>¿Qué estás buscando?</h2><p>Elegí una categoría para ver los productos.</p></div><div class="home-grid">';
  categorias.forEach(c => {
    const items = productos.filter(p => p.categoria === c.key);
    if (!items.length) return;
    const conFoto = items.find(p => imgList(p.id).length);
    let coverImg = conFoto ? imgList(conFoto.id)[0] : null;
    if (!coverImg && c.key === 'descanso') { const cm = colchones.find(m=>m.img); if (cm) coverImg = cm.img; }
    const cover = coverImg ? `<img src="${coverImg}" alt="${c.label}" loading="lazy">` : `<div class="home-cat-emoji">${c.label.trim().charAt(0)}</div>`;
    const total = items.length + (c.key === 'descanso' ? colchones.length : 0);
    html += `
      <div class="home-cat" onclick="filtrar('${c.key}')">
        ${cover}
        <div class="home-cat-overlay">
          <span>${c.label}</span>
          <small>${total} producto${total!==1?'s':''}</small>
        </div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('catalogo').innerHTML = html;
}

function renderCatalogo(filtro) {
  let html = '';
  if (filtro !== 'todos' && filtro !== 'inicio') {
    html += `<button class="volver-btn" onclick="filtrar('inicio')">← Todas las categorías</button>`;
  }
  const cats = filtro === 'todos' ? categorias : categorias.filter(c => c.key === filtro);
  cats.forEach(cat => {
    const items = productos.filter(p => p.categoria === cat.key);
    const esDescanso = cat.key === 'descanso';
    if (!items.length && !esDescanso) return;
    html += `<h2 class="categoria-titulo">${cat.label}</h2><div class="grid">`;
    if (esDescanso) colchones.forEach(m => { html += renderColchonCard(m); });
    items.forEach(p => { html += cardHTML(p); });
    html += '</div>';
  });
  document.getElementById('catalogo').innerHTML = html;
}

function renderBusqueda(q) {
  const nq = norm(q);
  const cols = colchones.filter(m => norm(m.nombre).includes(nq) || norm(m.spec).includes(nq) || norm('colchon sommier colchones sommiers').includes(nq));
  const prods = productos.filter(p => norm(p.nombre).includes(nq) || norm(p.desc).includes(nq));
  let html = `<button class="volver-btn" onclick="filtrar('inicio')">← Todas las categorías</button>`;
  html += `<h2 class="categoria-titulo">Resultados para “${q}”</h2>`;
  if (!cols.length && !prods.length) {
    html += `<p style="color:var(--gris);padding:0 4px 40px">No encontramos productos con “${q}”. Probá con otra palabra (ej: placard, colchón, mesa).</p>`;
  } else {
    html += '<div class="grid">';
    cols.forEach(m => { html += renderColchonCard(m); });
    prods.forEach(p => { html += cardHTML(p); });
    html += '</div>';
  }
  document.getElementById('catalogo').innerHTML = html;
}
function norm(s) { return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }

// CARRITO — entradas: { key, nombre, precio, img }
let carritoItems = [];

function enCarrito(key) { return carritoItems.some(e => e.key === key); }
function toggleKey(key, nombre, precio, img) {
  const i = carritoItems.findIndex(e => e.key === key);
  if (i === -1) carritoItems.push({ key, nombre, precio, img });
  else carritoItems.splice(i, 1);
  actualizarCarrito();
  render();
}
function toggleCarrito(id) {
  const p = productos.find(x => x.id === id);
  if (!p) return;
  toggleKey('p' + id, p.nombre, p.precio, imgList(id)[0] || null);
}
function quitarKey(key) {
  const i = carritoItems.findIndex(e => e.key === key);
  if (i >= 0) carritoItems.splice(i, 1);
  actualizarCarrito();
  render();
}

function actualizarCarrito() {
  const n = carritoItems.length;
  document.getElementById('carritoBadge').textContent = n;
  document.getElementById('carritoBtn').classList.toggle('oculto', n === 0);

  const itemsEl = document.getElementById('carritoItems');
  const footerEl = document.getElementById('carritoFooter');
  const totalEl = document.getElementById('carritoTotal');

  if (n === 0) {
    itemsEl.innerHTML = '<div class="carrito-vacio">Todavía no agregaste productos.<br>Tocá <strong>+ Agregar</strong> en los que te interesan.</div>';
    footerEl.style.display = 'none';
    return;
  }

  let totalContado = 0;
  itemsEl.innerHTML = carritoItems.map(e => {
    if (e.precio) totalContado += e.precio;
    const imgHtml = e.img
      ? `<div class="carrito-item-img"><img src="${e.img}" alt="${e.nombre}"></div>`
      : `<div class="carrito-item-img">🛒</div>`;
    const precioStr = e.precio ? formatPeso(e.precio) : 'Consultá precio';
    return `
      <div class="carrito-item">
        ${imgHtml}
        <div class="carrito-item-info">
          <div class="carrito-item-nombre">${e.nombre}</div>
          <div class="carrito-item-precio">${precioStr}</div>
        </div>
        <button class="carrito-item-quitar" onclick="quitarKey('${e.key}')" title="Quitar">×</button>
      </div>`;
  }).join('');

  footerEl.style.display = 'flex';
  totalEl.innerHTML = totalContado > 0
    ? `Total estimado contado: <strong>${formatPeso(totalContado)}</strong>`
    : `${n} producto${n > 1 ? 's' : ''} seleccionado${n > 1 ? 's' : ''}`;
}

function abrirCarrito() {
  document.getElementById('carritoOverlay').classList.add('abierto');
  document.getElementById('carritoPanel').classList.add('abierto');
  actualizarCarrito();
}

function cerrarCarrito() {
  document.getElementById('carritoOverlay').classList.remove('abierto');
  document.getElementById('carritoPanel').classList.remove('abierto');
}

function vaciarCarrito() {
  carritoItems = [];
  actualizarCarrito();
  render();
}

function consultarTodo() {
  const lista = carritoItems.map(e => `• ${e.nombre}${e.precio ? ` — ${formatPeso(e.precio)}` : ''}`).join('\n');
  const msg = encodeURIComponent(`Hola! Quiero consultar sobre los siguientes productos:\n\n${lista}\n\n¿Me pueden dar precios y disponibilidad?`);
  window.open(`https://wa.me/${WA}?text=${msg}`, '_blank');
}

let filtroActual = 'inicio';
let busquedaActiva = '';

function render() {
  if (busquedaActiva) renderBusqueda(busquedaActiva);
  else if (filtroActual === 'inicio') renderHome();
  else renderCatalogo(filtroActual);
}

function filtrar(key) {
  busquedaActiva = '';
  const inp = document.getElementById('buscador');
  if (inp) inp.value = '';
  document.getElementById('buscadorClear').style.display = 'none';
  filtroActual = key;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buscar(q) {
  busquedaActiva = q.trim();
  document.getElementById('buscadorClear').style.display = busquedaActiva ? 'block' : 'none';
  if (!busquedaActiva) { render(); return; }
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  render();
}
function limpiarBusqueda() {
  busquedaActiva = '';
  document.getElementById('buscador').value = '';
  document.getElementById('buscadorClear').style.display = 'none';
  filtrar('inicio');
}

function setModo(modo) {
  modoActual = modo;
  document.querySelectorAll('.precio-toggle button').forEach((b,i) => {
    b.classList.toggle('active', ['contado','3c','6c','12c'][i] === modo);
  });
  render();
}

render();
</script>
</body>
